<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌾 AI Crop Suitability Agent</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f1a14; color: #e8f5e9; }
  header { background: linear-gradient(135deg, #1b5e20, #2e7d32); padding: 20px 32px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 22px; }
  header p { font-size: 13px; opacity: 0.8; margin-top: 2px; }
  .container { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 72px); }
  .sidebar { background: #1a2e1f; padding: 20px; overflow-y: auto; border-right: 1px solid #2d5a3d; }
  .sidebar h3 { color: #81c784; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  select { width: 100%; background: #0f1a14; color: #e8f5e9; border: 1px solid #2d5a3d; border-radius: 8px; padding: 10px; font-size: 14px; margin-bottom: 16px; }
  button { width: 100%; background: linear-gradient(135deg, #2e7d52, #43a047); color: white; border: none; border-radius: 10px; padding: 12px; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 16px; }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #map { width: 100%; height: 100%; }
  .result { background: #162619; border: 1px solid #2d5a3d; border-radius: 12px; padding: 16px; margin-top: 12px; display: none; }
  .score-big { text-align: center; padding: 16px; border-radius: 10px; margin-bottom: 12px; }
  .score-num { font-size: 52px; font-weight: 700; color: #69f0ae; line-height: 1; }
  .score-label { font-size: 11px; color: #81c784; text-transform: uppercase; letter-spacing: 1px; }
  .rating { font-size: 16px; margin-top: 6px; }
  .metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .metric { background: #0f1a14; border-radius: 8px; padding: 10px; text-align: center; }
  .metric-val { font-size: 18px; font-weight: 700; color: #69f0ae; }
  .metric-lbl { font-size: 10px; color: #81c784; text-transform: uppercase; }
  .factor { margin: 6px 0; display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .bar-bg { flex: 1; background: #2d5a3d; border-radius: 4px; height: 14px; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
  .rec-box { background: #0f1a14; border-left: 3px solid #43a047; border-radius: 0 8px 8px 0; padding: 12px; font-size: 13px; line-height: 1.6; color: #c8e6c9; margin-top: 12px; }
  .info-tip { background: #162619; border: 1px solid #2d5a3d; border-radius: 8px; padding: 12px; font-size: 12px; color: #81c784; margin-bottom: 12px; }
  .spinner { text-align: center; padding: 20px; color: #81c784; display: none; }
  hr { border-color: #2d5a3d; margin: 12px 0; }
</style>
</head>
<body>
<header>
  <div style="font-size:28px;">🌾</div>
  <div>
    <h1>AI Crop Suitability Agent</h1>
    <p>GeoAI-powered agricultural land analysis</p>
  </div>
</header>
<div class="container">
  <div class="sidebar">
    <h3>Select Crop</h3>
    <select id="crop">
      <option value="wheat">🌾 Wheat</option>
      <option value="corn">🌽 Corn</option>
      <option value="sunflower">🌻 Sunflower</option>
      <option value="tomato">🍅 Tomato</option>
      <option value="potato">🥔 Potato</option>
      <option value="barley">🌿 Barley</option>
      <option value="soybean">🫘 Soybean</option>
      <option value="grape">🍇 Grape</option>
    </select>
    <button id="analyzeBtn" disabled onclick="analyze()">🤖 Run AI Agent Analysis</button>
    <div class="info-tip" id="tip">👆 Click anywhere on the map to select a location</div>
    <div class="spinner" id="spinner">⏳ Agent analyzing...</div>
    <div class="result" id="result">
      <div class="score-big" id="scoreBig">
        <div class="score-num" id="scoreNum">—</div>
        <div class="score-label">Suitability Score / 100</div>
        <div class="rating" id="ratingText">—</div>
      </div>
      <div class="metrics">
        <div class="metric"><div class="metric-val" id="tempVal">—</div><div class="metric-lbl">Temp °C</div></div>
        <div class="metric"><div class="metric-val" id="precipVal">—</div><div class="metric-lbl">Rain mm</div></div>
        <div class="metric"><div class="metric-val" id="phVal">—</div><div class="metric-lbl">Soil pH</div></div>
      </div>
      <hr>
      <h3 style="margin-bottom:8px;">📊 Factor Scores</h3>
      <div id="factors"></div>
      <div class="rec-box" id="recBox"></div>
    </div>
  </div>
  <div id="map"></div>
</div>
<script>
  var map = L.map("map").setView([39.0, 35.0], 6);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {attribution: "CartoDB"}).addTo(map);
  var marker = null;
  var selLat = null, selLon = null;

  map.on("click", function(e) {
    selLat = e.latlng.lat;
    selLon = e.latlng.lng;
    if (marker) map.removeLayer(marker);
    marker = L.marker([selLat, selLon]).addTo(map);
    document.getElementById("tip").innerHTML = "📍 " + selLat.toFixed(4) + ", " + selLon.toFixed(4) + " — Ready to analyze!";
    document.getElementById("analyzeBtn").disabled = false;
  });

  function analyze() {
    if (!selLat || !selLon) return;
    var crop = document.getElementById("crop").value;
    document.getElementById("analyzeBtn").disabled = true;
    document.getElementById("spinner").style.display = "block";
    document.getElementById("result").style.display = "none";

    fetch("/analyze", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({latitude: selLat, longitude: selLon, crop: crop})
    })
    .then(r => r.json())
    .then(data => {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("result").style.display = "block";
      document.getElementById("analyzeBtn").disabled = false;

      var score = data.suitability_score;
      var color = score>=75 ? "#2e7d32" : score>=55 ? "#f57f17" : score>=35 ? "#e65100" : "#b71c1c";
      var emoji = score>=75 ? "✅ Excellent" : score>=55 ? "👍 Good" : score>=35 ? "⚠️ Moderate" : "❌ Poor";

      document.getElementById("scoreBig").style.background = color;
      document.getElementById("scoreNum").textContent = score;
      document.getElementById("ratingText").textContent = emoji;
      document.getElementById("tempVal").textContent = data.avg_temp + "°";
      document.getElementById("precipVal").textContent = data.annual_precip;
      document.getElementById("phVal").textContent = data.soil_ph;

      var fhtml = "";
      var icons = {Temperature: "🌡️", Precipitation: "🌧️", "Soil pH": "🌱"};
      for (var k in data.factors) {
        var v = data.factors[k];
        var fc = v>=70 ? "#2e7d32" : v>=40 ? "#f57f17" : "#b71c1c";
        fhtml += "<div class='factor'><span style='width:110px'>" + icons[k] + " " + k + "</span><div class='bar-bg'><div class='bar-fill' style='width:" + v + "%;background:" + fc + "'></div></div><span>" + v + "</span></div>";
      }
      document.getElementById("factors").innerHTML = fhtml;
      document.getElementById("recBox").textContent = data.recommendation;

      if (marker) marker.bindPopup(crop + ": " + score + "/100").openPopup();
    })
    .catch(err => {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("analyzeBtn").disabled = false;
      alert("Error: " + err);
    });
  }
</script>
</body>
</html>
